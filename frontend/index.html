<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Onchain Guestbook</title>
</head>
<body style="max-width: 480px; margin: 40px auto; font-family: sans-serif;">
  <h1>Onchain Guestbook</h1>

  <button id="connectBtn" style="padding: 8px 16px; background: black; color: white;">
    Connect Wallet
  </button>
  <p id="account"></p>

  <div id="postSection" style="display: none; margin-top: 20px;">
    <input id="messageInput" maxlength="280" placeholder="Say something..." style="width: 100%; padding: 8px;" />
    <button id="postBtn" style="margin-top: 10px; padding: 8px 16px; background: black; color: white;">
      Post
    </button>
    <p id="status"></p>
  </div>

  <ul id="posts" style="margin-top: 30px;"></ul>

  <script type="module" src="./app.js"></script>
</body>
</html>
